<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Style Showcase</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #081425;
            color: #d8e3fb;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        #preview-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2a3c 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px;
            overflow: hidden;
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            border: 1px solid #2a3548;
        }

        /* Device Sizes */
        .device-desktop { width: 100% !important; height: 100% !important; }
        .device-tablet { width: 768px !important; height: 1024px !important; max-height: 100%; }
        .device-mobile { width: 375px !important; height: 812px !important; max-height: 100%; }

        /* Code Snippet Panel */
        #code-panel {
            position: fixed;
            top: 64px;
            right: -600px;
            width: 600px;
            bottom: 0;
            background: #111c2d;
            border-left: 1px solid #2a3548;
            transition: right 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }
        #code-panel.open { right: 0; }
        
        pre { margin: 0; padding: 1rem; overflow-x: auto; font-size: 13px; color: #e2e2e2; }
    </style>
</head>

<body>
    <!-- Top Toolbar -->
    <header class="h-16 bg-[#040e1f] border-b border-[#2a3548] flex items-center justify-between px-6 z-10 shrink-0">
        <div class="flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-2 text-[#8e9192] hover:text-white transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="text-sm font-medium">Back to Index</span>
            </a>
            <div class="h-6 w-px bg-[#2a3548]"></div>
            <h1 id="style-title" class="font-semibold text-lg text-white">Loading...</h1>
            <span id="a11y-badge" class="ml-2 text-xs px-2 py-0.5 rounded-full bg-[#1f2a3c] text-[#a9bad3] border border-[#3a4a5f] hidden"></span>
        </div>

        <!-- Device Toggles -->
        <div class="flex items-center bg-[#152031] rounded-lg p-1 border border-[#2a3548]">
            <button class="device-btn p-1.5 rounded-md text-[#8e9192] hover:text-white hover:bg-[#2a3548] transition-colors active" data-device="device-desktop" title="Desktop">
                <span class="material-symbols-outlined text-[20px]">desktop_windows</span>
            </button>
            <button class="device-btn p-1.5 rounded-md text-[#8e9192] hover:text-white hover:bg-[#2a3548] transition-colors" data-device="device-tablet" title="Tablet">
                <span class="material-symbols-outlined text-[20px]">tablet_mac</span>
            </button>
            <button class="device-btn p-1.5 rounded-md text-[#8e9192] hover:text-white hover:bg-[#2a3548] transition-colors" data-device="device-mobile" title="Mobile">
                <span class="material-symbols-outlined text-[20px]">smartphone</span>
            </button>
        </div>

        <div class="flex items-center gap-3">
            <button id="toggle-code" class="flex items-center gap-2 px-3 py-1.5 bg-[#1f2a3c] hover:bg-[#2a3548] text-white rounded-lg border border-[#3a4a5f] transition-colors text-sm font-medium">
                <span class="material-symbols-outlined text-[18px]">code</span>
                View Code
            </button>
            <div class="flex items-center gap-1">
                <button id="btn-prev" class="p-1.5 bg-[#152031] hover:bg-[#2a3548] text-[#8e9192] hover:text-white rounded-lg border border-[#2a3548] transition-colors" title="Previous Style">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button id="btn-next" class="p-1.5 bg-[#152031] hover:bg-[#2a3548] text-[#8e9192] hover:text-white rounded-lg border border-[#2a3548] transition-colors" title="Next Style">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Preview Area -->
    <main id="preview-container">
        <iframe id="preview-frame" class="device-desktop" src="about:blank" frameborder="0"></iframe>
    </main>

    <!-- Slide-out Code Panel -->
    <aside id="code-panel">
        <div class="h-14 border-b border-[#2a3548] flex items-center justify-between px-4 shrink-0 bg-[#040e1f]">
            <h2 class="text-sm font-semibold text-white">Source Code</h2>
            <div class="flex gap-2">
                <button id="copy-code" class="flex items-center gap-1 text-xs text-[#8e9192] hover:text-white bg-[#152031] px-2 py-1 rounded border border-[#2a3548] transition-colors">
                    <span class="material-symbols-outlined text-[14px]">content_copy</span> Copy
                </button>
                <button id="close-code" class="text-[#8e9192] hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
        </div>
        
        <div id="playground-controls" class="border-b border-[#2a3548] p-4 hidden bg-[#152031]">
            <h3 class="text-xs font-semibold text-[#a9bad3] uppercase tracking-wider mb-3">Playground</h3>
            <div id="slider-container" class="space-y-3"></div>
        </div>

        <div class="flex-1 overflow-auto bg-[#0d1117] relative">
            <pre><code id="code-block">Loading...</code></pre>
        </div>
    </aside>

    <script>
        // Data derived from styles.md and index.html structure
        const stylesData = [
            { id: 'minimal', path: 'categories/clean_soft/minimal.html', title: '1. Minimal', category: 'Clean & Soft', a11y: 'High Contrast' },
            { id: 'modern_saas', path: 'categories/clean_soft/modern_saas.html', title: '2. Modern SaaS', category: 'Clean & Soft', a11y: 'WCAG AAA' },
            { id: 'swiss', path: 'categories/clean_soft/swiss.html', title: '3. Swiss', category: 'Clean & Soft', a11y: 'Accessible' },
            { id: 'glassmorphism', path: 'categories/experimental_immersive/glassmorphism.html', title: '4. Glassmorphism', category: 'Experimental & Immersive', a11y: 'Low Contrast Warning', playground: [{ name: 'Blur', var: '--glass-blur', min: 0, max: 100, val: 20, unit: 'px' }] },
            { id: 'liquid_glass', path: 'categories/experimental_immersive/liquid_glass.html', title: '5. Liquid Glass', category: 'Experimental & Immersive', a11y: 'Motion Warning' },
            { id: 'aurora', path: 'categories/experimental_immersive/aurora.html', title: '6. Aurora', category: 'Experimental & Immersive' },
            { id: 'cyberpunk', path: 'categories/experimental_immersive/cyberpunk.html', title: '7. Cyberpunk', category: 'Experimental & Immersive', a11y: 'High Saturation' },
            { id: 'futuristic_4d', path: 'categories/experimental_immersive/futuristic_4d.html', title: '8. Futuristic 4D', category: 'Experimental & Immersive' },
            { id: 'ai_native', path: 'categories/experimental_immersive/ai_native.html', title: '9. AI Native', category: 'Experimental & Immersive' },
            { id: 'claymorphism', path: 'categories/clean_soft/claymorphism.html', title: '10. Claymorphism', category: 'Clean & Soft' },
            { id: '3d_illustration', path: 'categories/clean_soft/3d_illustration.html', title: '11. 3D Illustration', category: 'Clean & Soft' },
            { id: 'organic', path: 'categories/clean_soft/organic.html', title: '12. Organic', category: 'Clean & Soft' },
            { id: 'neobrutalism', path: 'categories/bold_editorial/neobrutalism.html', title: '13. Neobrutalism', category: 'Bold & Editorial', playground: [{ name: 'Shadow Offset', var: '--neo-shadow', min: 0, max: 20, val: 6, unit: 'px' }] },
            { id: 'memphis', path: 'categories/bold_editorial/memphis.html', title: '14. Memphis', category: 'Bold & Editorial' },
            { id: 'y2k', path: 'categories/bold_editorial/y2k.html', title: '15. Y2K', category: 'Bold & Editorial' },
            { id: 'playful', path: 'categories/bold_editorial/playful.html', title: '16. Playful', category: 'Bold & Editorial' },
            { id: 'luxury_editorial', path: 'categories/bold_editorial/luxury_editorial.html', title: '17. Luxury Editorial', category: 'Bold & Editorial' },
            { id: 'dark_luxury', path: 'categories/bold_editorial/dark_luxury.html', title: '18. Dark Luxury', category: 'Bold & Editorial' },
            { id: 'editorial', path: 'categories/bold_editorial/editorial.html', title: '19. Editorial', category: 'Bold & Editorial' },
            { id: 'retro_futurism', path: 'categories/bold_editorial/retro_futurism.html', title: '20. Retro Futurism', category: 'Bold & Editorial' }
        ];

        // URL Parsing
        const urlParams = new URLSearchParams(window.location.search);
        let requestedPath = urlParams.get('style');
        
        // Find current style index
        let currentIndex = stylesData.findIndex(s => s.path === requestedPath);
        if (currentIndex === -1) {
            // Default to first if not found
            currentIndex = 0;
            requestedPath = stylesData[0].path;
        }

        const currentStyle = stylesData[currentIndex];

        // UI Updates
        document.getElementById('style-title').textContent = currentStyle.title;
        const frame = document.getElementById('preview-frame');
        frame.src = requestedPath;

        // a11y Badge
        if (currentStyle.a11y) {
            const badge = document.getElementById('a11y-badge');
            badge.textContent = currentStyle.a11y;
            badge.style.display = 'inline-block';
            if(currentStyle.a11y.includes('Warning')) {
                badge.className = "ml-2 text-xs px-2 py-0.5 rounded-full bg-[#3d2c12] text-[#f2b84b] border border-[#5c421b]";
            }
        }

        // Navigation
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentIndex > 0) {
                window.location.href = `showcase.html?style=${stylesData[currentIndex - 1].path}`;
            }
        });
        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentIndex < stylesData.length - 1) {
                window.location.href = `showcase.html?style=${stylesData[currentIndex + 1].path}`;
            }
        });
        
        // Disable Prev/Next if at boundaries
        if(currentIndex === 0) document.getElementById('btn-prev').style.opacity = '0.5';
        if(currentIndex === stylesData.length - 1) document.getElementById('btn-next').style.opacity = '0.5';

        // Device Toggles
        const deviceBtns = document.querySelectorAll('.device-btn');
        deviceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                deviceBtns.forEach(b => b.classList.remove('text-white', 'bg-[#2a3548]'));
                btn.classList.add('text-white', 'bg-[#2a3548]');
                frame.className = btn.dataset.device;
            });
        });

        // Code Panel Toggle
        const codePanel = document.getElementById('code-panel');
        document.getElementById('toggle-code').addEventListener('click', () => codePanel.classList.add('open'));
        document.getElementById('close-code').addEventListener('click', () => codePanel.classList.remove('open'));

        // Load Source Code
        // Attempt fetch first (works on servers), fallback to iframe reading (might work on some file://), then error out.
        fetch(requestedPath)
            .then(response => {
                if(!response.ok) throw new Error("Network response was not ok");
                return response.text();
            })
            .then(html => {
                document.getElementById('code-block').textContent = html;
            })
            .catch(err => {
                // If fetch fails (likely due to CORS on file:// protocol), try reading from the loaded iframe
                frame.addEventListener('load', () => {
                    try {
                        const html = frame.contentDocument.documentElement.outerHTML;
                        document.getElementById('code-block').textContent = '<!DOCTYPE html>\n' + html;
                    } catch(e) {
                        document.getElementById('code-block').textContent = '// Failed to load source code.\n// This is likely because you are opening the file directly (file:// protocol) which blocks local file reading for security.\n// Please run a local development server (e.g., using VSCode Live Server or running `npx serve` in the terminal) to view the source code.';
                    }
                });
                
                // Set a timeout in case iframe doesn't trigger load or fails
                setTimeout(() => {
                    if(document.getElementById('code-block').textContent === 'Loading...') {
                         document.getElementById('code-block').textContent = '// Failed to load source code.\n// This is likely because you are opening the file directly (file:// protocol) which blocks local file reading for security.\n// Please run a local development server (e.g., using VSCode Live Server or running `npx serve` in the terminal) to view the source code.';
                    }
                }, 1000);
            });

        // Copy Code
        document.getElementById('copy-code').addEventListener('click', (e) => {
            const text = document.getElementById('code-block').textContent;
            navigator.clipboard.writeText(text);
            const btn = e.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined text-[14px]">check</span> Copied`;
            setTimeout(() => btn.innerHTML = originalHtml, 2000);
        });

        // Playground
        const pgContainer = document.getElementById('playground-controls');
        if (currentStyle.playground && currentStyle.playground.length > 0) {
            pgContainer.style.display = 'block';
            const sliderContainer = document.getElementById('slider-container');
            
            currentStyle.playground.forEach(control => {
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <div class="flex justify-between text-xs text-[#d8e3fb] mb-1">
                        <span>${control.name}</span>
                        <span id="val-${control.var}">${control.val}${control.unit}</span>
                    </div>
                    <input type="range" min="${control.min}" max="${control.max}" value="${control.val}" class="w-full accent-primary">
                `;
                const input = wrapper.querySelector('input');
                const valDisplay = wrapper.querySelector(`span#val-${control.var}`);
                
                input.addEventListener('input', (e) => {
                    const val = e.target.value;
                    valDisplay.textContent = `${val}${control.unit}`;
                    // Inject CSS var into iframe
                    try {
                        frame.contentWindow.document.documentElement.style.setProperty(control.var, `${val}${control.unit}`);
                    } catch(e) {}
                });
                
                sliderContainer.appendChild(wrapper);
            });
        }
    </script>
</body>
</html>
