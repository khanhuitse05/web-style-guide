name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create unique deployment file
        run: echo ${{ github.sha }} > version.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $RUNNER_TEMP/firebase-key.json
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-key.json"
          
          # Deploy, but catch the specific "current active version" error caused by retries
          OUTPUT=$(firebase deploy --only hosting --project web-style-guide --non-interactive 2>&1) || EXIT_CODE=$?
          
          echo "$OUTPUT"
          
          if [ "${EXIT_CODE:-0}" -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "Deployment succeeded on the first attempt, ignoring the retry error."
              exit 0
            else
              exit $EXIT_CODE
            fi
          fi
